{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <div class="row align-items-center justify-content-center" style="height: 100vh;">
        <div class="col-12 col-md-10 col-lg-5 bg-light rounded-4 p-4">
            <p class="fs-4 fw-bold">Add Player</p>
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div>
                    <label for="" class="form-label">Match No</label>
                    <input type="text" class="form-control" name="match_no" id="match_no">
                </div>
                <div>
                    <label for="" class="form-label">Date</label>
                    <input type="date" class="form-control" name="date" id="date">
                </div>
                <div>
                    <label for="" class="form-label">Team 1</label>
                    <select name="team" id="team" class="form-select">
                        {% for team in teams %}
                        <option value="{{team.id}}">{{team.team_name}}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label for="" class="form-label">Team 2</label>
                    <select name="team" id="team" class="form-select">
                        {% for team in teams %}
                        <option value="{{team.id}}">{{team.team_name}}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Save</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
